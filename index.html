        /* skeleton pulse */
        .skeleton { background: linear-gradient(90deg, #e5eeff 25%, #dce9ff 50%, #e5eeff 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }

    <script>
    // ── CONFIG ─────────────────────────────────────────────────────────────────
    // The R2 public base URL (no trailing slash)
    const R2_PUBLIC_BASE = 'https://pub-9fd0da456f854d09894aa770acbf93f5.r2.dev';

    // Derive product ID from the URL path: /<product-id>  OR  ?id=<product-id>
    function getProductId() {
    const company_profile = {
        company_name: 'Default Location'
    };
        const params = new URLSearchParams(location.search);
        if (params.get('id')) return params.get('id');
        const slug = location.pathname.split('/').filter(Boolean).pop();
        return slug || null;
    }

    // ── GALLERY STATE ──────────────────────────────────────────────────────────
    let galleryImages = [];
    let currentIndex = 0;

    function setMainImage(index) {
        if (!galleryImages.length) return;
        currentIndex = (index + galleryImages.length) % galleryImages.length;
        const img = document.getElementById('main-gallery-image');
        img.style.opacity = '0';
        img.style.transform = 'scale(1.05)';
        setTimeout(() => {
            img.src = galleryImages[currentIndex];
            img.style.opacity = '1';
            img.style.transform = 'scale(1)';
            document.getElementById('current-img-index').textContent = currentIndex + 1;
        }, 250);
        // highlight active thumb
        document.querySelectorAll('.thumb-btn').forEach((btn, i) => {
            btn.classList.toggle('thumb-active', i === currentIndex);
        });
    }

    function slideGallery(dir) { setMainImage(currentIndex + dir); }

    // ── SPEC CHIP ──────────────────────────────────────────────────────────────
    const SPEC_META = {
        manufacturer: { icon: 'directions_car',    label: v => v },
        model:        { icon: 'car_gear',           label: v => v },
        year:         { icon: 'calendar_today',     label: v => v },
        mileage:      { icon: 'speed',              label: v => v || '—' },
        fuel:         { icon: 'local_gas_station',  label: v => v },
        transmission: { icon: 'auto_transmission',  label: v => v },
        owners:       { icon: 'person',             label: v => v + ' Owner' },
        color:        { icon: 'palette',            label: v => v },
    };

    function buildSpecsGrid(specs) {
        const grid = document.getElementById('specs-grid');
        grid.innerHTML = '';
        let delay = 300;
        for (const [key, meta] of Object.entries(SPEC_META)) {
            const val = specs[key];
            if (!val) continue;
            const chip = document.createElement('div');
            chip.className = 'bg-surface-container-lowest rounded-xl border border-outline-variant ambient-shadow lift-glow premium-hover flex items-center gap-3 p-4 transition-all opacity-0 animate-fade-up';
            chip.style.animationDelay = delay + 'ms';
            chip.innerHTML = `
                <span class="material-symbols-outlined text-primary">${meta.icon}</span>
                <div class="font-label-md text-label-md">${meta.label(val)}</div>`;
            grid.appendChild(chip);
            delay += 50;
        }
    }

    // ── PRICE FORMATTER ────────────────────────────────────────────────────────
    function formatPrice(price) {
        if (!price || price === 0) return 'Contact Us';
        return '$' + Number(price).toLocaleString('en-US');
    }

    // ── THUMBNAILS ─────────────────────────────────────────────────────────────
    function buildThumbnails(images) {
        const container = document.getElementById('thumbnails');
        container.innerHTML = '';
        images.forEach((src, i) => {
            const btn = document.createElement('button');
            btn.className = 'thumb-btn flex-shrink-0 w-32 md:w-48 aspect-video rounded-lg overflow-hidden border-2 border-transparent hover:border-outline-variant transition-all hover:scale-105 active:scale-95';
            if (i === 0) btn.classList.add('thumb-active');
            btn.onclick = () => setMainImage(i);
            const img = document.createElement('img');
            img.className = 'w-full h-full object-cover transition-transform duration-500 hover:scale-110';
            img.src = src;
            img.alt = `Vehicle photo ${i + 1}`;
            img.loading = 'lazy';
            btn.appendChild(img);
            container.appendChild(btn);
        });
    }

    // ── INQUIRY ────────────────────────────────────────────────────────────────
    function sendInquiry() {
        const name  = document.getElementById('inquiry-name').value.trim();
        const phone = document.getElementById('inquiry-phone').value.trim();
        const fb    = document.getElementById('inquiry-feedback');
        if (!name || !phone) {
            fb.textContent = 'Please fill in both fields.';
            fb.classList.remove('hidden');
            return;
        }
        // Real implementation: POST to your backend / WhatsApp / email API
        fb.textContent = "✓ Inquiry sent! We'll be in touch shortly.";
        fb.classList.remove('hidden');
    }

    // ── SHARE ──────────────────────────────────────────────────────────────────
    function shareVehicle() {
        if (navigator.share) {
            navigator.share({ title: document.title, url: location.href });
        } else {
            navigator.clipboard.writeText(location.href).then(() => alert('Link copied!'));
        }
    }

    // ── LOAD DATA ──────────────────────────────────────────────────────────────
    async function loadProduct() {
        const productId = getProductId();
        if (!productId) {
            showError('No product ID found in the URL.');
            return;
        }

        const jsonUrl = `${R2_PUBLIC_BASE}/products/${productId}.json`;

        try {
            const res = await fetch(jsonUrl);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderProduct(data);
        } catch (err) {
            showError(`Could not load listing: ${err.message}`);
        }
    }

    function renderProduct(data) {
        // Page title
        document.title = `${data.title} | ${data.location || 'Location'}`;

        // Gallery
        galleryImages = data.images || [];
        if (galleryImages.length) {
            const mainImg = document.getElementById('main-gallery-image');
            mainImg.src = galleryImages[0];
            mainImg.alt = data.title;
            document.getElementById('total-img-count').textContent = galleryImages.length;
            buildThumbnails(galleryImages);
        }

        // Title / location / price
        document.getElementById('vehicle-title').textContent = data.title || 'Vehicle';
        document.getElementById('vehicle-location').textContent = data.location || 'Location not specified';
        document.getElementById('company-name').textContent = data.location || 'Location not specified';
        document.getElementById('footer-text').textContent = `© 2026 ${data.location || 'Gallery'}. All rights reserved.`;
        document.getElementById('vehicle-price').textContent = formatPrice(data.price);

        // Specs
        buildSpecsGrid(data.specs || {});

        // Show content
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
    }

    function showError(msg) {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('error-message').textContent = msg;
        document.getElementById('error-state').classList.remove('hidden');
    }

    // ── BOOT ───────────────────────────────────────────────────────────────────
    loadProduct();

    window.addEventListener('scroll', () => {
        const header = document.querySelector('header');
        header.classList.toggle('shadow-md', window.scrollY > 20);
    });
    </script>
